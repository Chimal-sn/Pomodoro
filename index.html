<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" href="assets/img/icon.webp" type="image/x-icon">
    <script type="module" src="assets/js/script.js"></script>

<body>
    <div class="overlay"></div>
    <video autoplay muted loop src="assets/video/fondo_ciudad.mp4" poster="assets/img/fondo_ciudad.webp"

    <audio src="assets/audio/cancion1.mp3" preload="none" id="audio_musica"></audio>
    <div class="video_calidad">
        <video autoplay muted loop src="assets/video/fondo_ciudad.mp4" poster="assets/img/fondo_ciudad.webp"

        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" id="cambiar_video">
            <title xmlns="">chevron-right</title>
            <path fill="currentColor"
                d="M16 13v-2h-2v2zm-2-2V9h-2v2zm0 4v-2h-2v2zm-2-6V7h-2v2zm0 8v-2h-2v2zM10 7V5H8v2zm0 12v-2H8v2z" />
        </svg>
    </div>
    <div class="detalles_cancion">
        <p id="nombre_cancion"></p>
        <p id="artista_cancion"></p>
    </div>
    <div class="botones_reproduccion">
        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" id="boton_atras">

        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" id="boton_pausa">
            <title xmlns="">Pausa</title>
            <path fill="currentColor" d="M10 4H5v16h5zm9 0h-5v16h5z" />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" id="boton_siguiente">
            <title xmlns="">Siguiente</title>
            <path fill="currentColor" d="M6 4h2v2h2v2h2v2h2v4h-2v2h-2v2H8v2H6zm12 0h-2v16h2z" />
